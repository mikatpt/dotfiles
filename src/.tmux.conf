###################
###   Options   ###
###################

if-shell "uname | grep -q Darwin" 'set -g default-terminal "xterm-256color' 'set -g default-terminal "tmux-256color"'

set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'
set -g history-limit 20000
set -g renumber-windows on
setw -g mouse on
set -g focus-events on
set-environment -g 'IGNOREEOF' 2
set-environment -g 'ignoreeof' 2

set -g base-index 1                 # 1-index windows and panes
setw -g pane-base-index 1

set-option -g automatic-rename on
set-option -g automatic-rename-format "#{b:pane_current_path}"

set-option -g set-titles on         # Format titles
set-option -g set-titles-string "#T - #W"

setw -g mode-keys vi                # Vi mode options
set -sg escape-time 50
bind P paste-buffer
bind-key -T copy-mode-vi 'v' if-shell -F "#{selection_present}" "send -X clear-selection" "send -X begin-selection"
bind-key -T copy-mode-vi 'V' if-shell -F "#{selection_present}" "send -X clear-selection" "send -X select-line"
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection
bind-key -T copy-mode-vi C-c send -X cancel
bind-key -T copy-mode-vi q   send -X cancel
bind-key -T copy-mode-vi C-n send -X search-again
bind-key -T copy-mode-vi C-p send -X search-reverse
bind-key -T copy-mode-vi N   send -X search-reverse

#######################
###   Keybindings   ###
#######################

unbind C-b                          # Use C-S as leader key
set -g prefix C-s
bind C-s send-prefix
bind-key -T prefix s send-keys C-s

# Reload Configuration
bind C-r source-file ~/.tmux.conf \; display "Config Reloaded!"
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Splits

bind C-[ split-window -h -c "#{pane_current_path}"
bind C-] split-window -v -c "#{pane_current_path}"

bind C-k select-pane -t :.-
bind C-j select-pane -t :.+
bind C-h select-pane -L
bind C-l select-pane -R

unbind up
unbind left
unbind down
unbind right
bind -r up resize-pane -U 2       # Resize Splits
bind -r down resize-pane -D 2
bind -r left resize-pane -L 2
bind -r right resize-pane -R 2
bind -r C-up resize-pane -U 2       # Resize Splits
bind -r C-down resize-pane -D 2
bind -r C-left resize-pane -L 2
bind -r C-right resize-pane -R 2

bind-key C-y set-window-option synchronize-panes\; display-message "synchronize-panes #{?pane_synchronized,enabled,disabled}!"

# Windows

unbind t                            # New window
unbind C-t
bind-key t new-window
bind-key C-t new-window

bind C-p previous-window            # Navigate windows
bind C-n next-window

# Sessions
bind-key a new-session              # New session
bind-key C-a new-session

# No accidentally killing sessions...
unbind q
unbind C-q

bind-key C-d detach-client          # Detach session
bind-key C-s copy-mode

# Session management
bind C-q switch-client -n
bind C-w confirm-before -p "kill pane? (y/n)" kill-pane
bind C-m command-prompt "new-session -s '%%'"

# Window management
bind C-o rotate-window
bind C-,  command-prompt -I "#{window_name}" "rename-window '%%'"
bind ,    command-prompt -I "#{window_name}" "rename-window '%%'"
bind -n C-S-Left  swap-window -t :-1\; select-window -t :-1
bind -n C-S-Right swap-window -t :+1\; select-window -t :+1

bind C-1 select-window -t :1
bind C-2 select-window -t :2
bind C-3 select-window -t :3
bind C-4 select-window -t :4
bind C-5 select-window -t :5
bind C-6 select-window -t :6
bind C-7 select-window -t :7
bind C-8 select-window -t :8
bind C-9 select-window -t :9

# Pane navigation (without ctrl)
bind j select-pane -D
bind k select-pane -U

##############################
### Color & Style Settings ###
##############################
# For more tips see https://github.com/sbernheim4/dotfiles/blob/master/tmux/.tmux.conf

set -g status-left-length 32
set -g status-right-length 150
set -g status-interval 5
set -g display-time 1500

# tmux_bg='#202328'
tmux_bg='#000A14'
tmux_fg='#081633'
tmux_aqua='#3affdb'
tmux_beige='#f5c06f'
tmux_blue='#00aceb'
tmux_brown='#905532'
tmux_cyan='#008080'
tmux_darkblue='#081633'
tmux_darkorange='#f16529'
tmux_green='#98be65'
tmux_grey="#8c979a"
tmux_lightblue='#5fd7ff'
tmux_lightgreen='#31b53e'
tmux_magenta='#9E30C0'
tmux_orange='#d4843e'
tmux_pink='#cb6f6f'
tmux_purple='#834f79'
tmux_red='#ae403f'
tmux_salmon='#ee6e73'
tmux_violet='#a9a1e1'
tmux_white='#eff0f1'
tmux_yellow='#f09f17'

# default statusbar colors
set-option -g status-style fg=default,bg=default

set-window-option -g window-status-style fg=$tmux_grey
set-window-option -g window-status-format "#I #W"

# active window title colors
set-window-option -g window-status-current-style fg=$tmux_blue,bg=$tmux_bg
set-window-option -g window-status-current-format "#I #[bold]#W"

set-window-option -g status-left-style fg=$tmux_bg,bg=$tmux_blue
set-window-option -g status-right-style bg=default

set-option -g status-position top   # Status bar location

# pane border colors
set-window-option -g pane-active-border-style fg=$tmux_violet
set-window-option -g pane-border-style fg=$tmux_violet

# message text
set-option -g message-style bg=$tmux_bg,fg=$tmux_magenta

# pane number display
set-option -g display-panes-active-colour $tmux_magenta
set-option -g display-panes-colour $tmux_blue

# clock
set-window-option -g clock-mode-colour $tmux_magenta

# Maybe display host when we start ssh'ing more often.
tm_host="#[fg=$tmux_blue,bg=$tmux_bg]#[bold,bg=$tmux_bg,fg=$tmux_blue] #h"

tm_user="#[bold,bg=$tmux_blue,fg=$tmux_bg] $USER |"
tm_session_name="#[bold,bg=$tmux_blue,fg=$tmux_bg] #S #[fg=$tmux_bg,bg=$tmux_blue]#[bg=$tmux_bg] "

tm_cwd="#[bold,fg=$tmux_magenta,bg=$tmux_bg] #{s|$HOME|~|:pane_current_path}"
tm_mode="#{?pane_in_mode,#[fg=colour226]#[bold] COPY,#[fg=white,bold] NORM}"
tm_cpu="#[fg=$tmux_salmon] #(top -l1 -s0 | awk '/CPU usage/{print int(100-$7)}' | sed 's/.*/CPU &%\%/')"

set -g status-left "$tm_user$tm_session_name"
set -g status-right "$tm_cwd$tm_mode$tm_cpu"
